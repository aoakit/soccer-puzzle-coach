function drawEffects() {
    ctx.save();
    for(const e of effects) {
        const a = clamp(e.life / e.maxLife, 0, 1);
        ctx.globalAlpha = a;
        if(e.type === 'line') {
            ctx.strokeStyle = e.color;
            ctx.lineWidth = 5 + (1 - a) * 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(e.x1, e.y1);
            ctx.lineTo(e.x2, e.y2);
            ctx.stroke();
        }
        else if(e.type === 'space') {
            ctx.fillStyle = 'rgba(255,210,63,0.22)';
            ctx.strokeStyle = 'rgba(255,210,63,0.90)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r * (1.15 - a * 0.15), 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(e.label, e.x, e.y + 4);
        }
        else if(e.type === 'text') {
            ctx.fillStyle = e.color;
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0,0,0,0.65)';
            ctx.shadowBlur = 6;
            ctx.fillText(e.text, e.x, e.y - (1 - a) * 22);
            ctx.shadowBlur = 0;
        }
    }
    ctx.restore();
}

function rarityGradient(x0, x1, t) {
    const g = ctx.createLinearGradient(x0, 0, x1, 0);
    const hue = (t * 220) % 360;
    g.addColorStop(0, 'hsl(' + hue + ',92%,68%)');
    g.addColorStop(0.5, 'hsl(' + ((hue + 90) % 360) + ',92%,68%)');
    g.addColorStop(1, 'hsl(' + ((hue + 180) % 360) + ',92%,68%)');
    return g;
}

function drawGachaAnimation() {
    if(phase !== 'clear' || !lastGachaReward || gachaAnim <= 0) return;

    const total = gachaAnimTotal || 110;
    const t = 1 - gachaAnim / total;
    const rarity = lastGachaReward.rarity;
    const rar = RARITIES[rarity];
    // 高レアほど「タメ」を長く
    const revealAt = rarity >= 4 ? 0.55 : rarity === 3 ? 0.48 : 0.36;
    const reveal = clamp((t - revealAt) / 0.22, 0, 1);
    const wob = reveal < 1 ? Math.sin(t * Math.PI * (10 + rarity * 6)) * (rarity - reveal * rarity) * 1.6 : 0;
    const shine = Math.sin(t * Math.PI * 6) * 0.5 + 0.5;
    const cx = fX0 + fW / 2 + wob;
    const cy = fY0 + fH * 0.60;
    const cardW = Math.min(270, fW * 0.70);
    const cardH = 132;
    const pop = reveal >= 1 ? 1 + Math.sin(Math.min(1, (t - revealAt - 0.22) * 5) * Math.PI) * 0.04 : 1;
    const scale = (0.84 + reveal * 0.18) * pop;
    const x = cx - cardW * scale / 2;
    const y = cy - cardH * scale / 2;

    ctx.save();
    ctx.globalAlpha = clamp(t / 0.15, 0, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.46)';
    ctx.fillRect(fX0, fY0, fW, fH);

    // レア度オーラ（開封前からチラ見せ）
    const auraColor = rarity === 4 ? null : rar.color;
    const rays = 10 + rarity * 4;
    for(let i = 0; i < rays; i++) {
        const ang = i / rays * Math.PI * 2 + t * (2 + rarity);
        const r1 = 36 + reveal * 22;
        const r2 = 112 + shine * (14 + rarity * 8) + rarity * 12;
        if(auraColor) {
            ctx.strokeStyle = i % 2 ? auraColor : 'rgba(255,255,255,0.40)';
        }
        else {
            ctx.strokeStyle = 'hsl(' + ((t * 360 + i * 36) % 360) + ',95%,70%)';
        }
        ctx.globalAlpha = 0.45 + shine * 0.30;
        ctx.lineWidth = rarity >= 3 ? 3 : 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(ang) * r1, cy + Math.sin(ang) * r1);
        ctx.lineTo(cx + Math.cos(ang) * r2, cy + Math.sin(ang) * r2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // UR開封の瞬間は画面フラッシュ
    if(rarity === 4 && reveal > 0 && reveal < 0.35) {
        ctx.fillStyle = 'rgba(255,255,255,' + (0.85 * (1 - reveal / 0.35)) + ')';
        ctx.fillRect(-30, -30, W + 60, H + 60);
    }

    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);

    const opened = reveal >= 0.95;
    const frameColor = rarity === 4 ? rarityGradient(x, x + cardW, t) : rar.color;

    ctx.shadowColor = rarity === 4 ? '#ffffff' : rar.color;
    ctx.shadowBlur = 14 + shine * (10 + rarity * 6);
    roundRectPath(x, y, cardW, cardH, 18);
    if(opened) {
        const cg = ctx.createLinearGradient(x, y, x, y + cardH);
        cg.addColorStop(0, '#ffffff');
        cg.addColorStop(1, rarity === 4 ? '#fff6dc' : rar.color + '55');
        ctx.fillStyle = cg;
    }
    else {
        ctx.fillStyle = '#16262e';
    }
    ctx.fill();
    ctx.shadowBlur = 0;
    roundRectPath(x, y, cardW, cardH, 18);
    ctx.strokeStyle = frameColor;
    ctx.lineWidth = 5;
    ctx.stroke();

    ctx.textAlign = 'center';
    if(!opened) {
        ctx.fillStyle = rarity >= 3 ? rar.color : '#d6ff3f';
        ctx.font = '900 18px sans-serif';
        ctx.fillText(lastGachaReward.pityHit ? 'キラキラ確定!' : 'ごほうびガチャ', cx, cy - 14);
        ctx.font = '900 34px sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText('？', cx, cy + 26);
    }
    else {
        ctx.fillStyle = rarity === 4 ? '#b8860b' : rar.color;
        ctx.font = '900 15px sans-serif';
        ctx.fillText(rar.stars + ' ' + rar.name + (lastGachaReward.isNew ? '  NEW!' : ''), cx, y + 24);
        ctx.font = '900 30px sans-serif';
        ctx.fillStyle = '#243042';
        ctx.fillText(lastGachaReward.icon, cx, y + 58);
        ctx.font = '900 19px sans-serif';
        ctx.fillText(lastGachaReward.title, cx, y + 88, cardW - 20);
        ctx.font = '700 12px sans-serif';
        ctx.fillStyle = '#5a6b80';
        const sub = lastGachaReward.isNew
            ? (lastGachaReward.kind === 'player' ? lastGachaReward.trait.desc : lastGachaReward.desc)
            : 'Lv' + lastGachaReward.level + ' にパワーアップ！';
        ctx.fillText(sub, cx, y + 112, cardW - 20);
    }

    ctx.restore();
}

function draw() {
    ctx.save();
    if(shake > 0.3) {
        ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }
    drawField();
    if(chance > 55) {
        ctx.save();
        const a = clamp((chance - 55) / 55, 0, 0.34);
        const grad = ctx.createLinearGradient(0, fY0, 0, fY0 + fH * 0.48);
        grad.addColorStop(0, 'rgba(214,255,63,' + a + ')');
        grad.addColorStop(1, 'rgba(214,255,63,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(fX0, fY0, fW, fH * 0.5);
        ctx.restore();
    }
    drawRewardHud();
    drawEffects();
    for(const a of arrows) drawArrow(a);
    drawAim();
    for(const p of players) {
        if(p !== ball.holder) drawPlayer(p);
    }
    if(ball.holder) drawPlayer(ball.holder);

    if(!ball.holder || ballFlight) {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, R * 0.42, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    if(caption) {
        ctx.font = 'bold 14px sans-serif';
        const maxW = Math.max(120, fW - 24);
        const textW = Math.min(ctx.measureText(caption).width + 24, maxW);
        ctx.fillStyle = 'rgba(0,0,0,0.62)';
        ctx.fillRect(fX0 + fW / 2 - textW / 2, fY0 + fH - 44, textW, 28);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText(caption, fX0 + fW / 2, fY0 + fH - 25, textW - 14);
    }

    if(mode === 'edit') {
        ctx.fillStyle = 'rgba(214,255,63,0.96)';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('配置編集中: 選手をドラッグして場面づくり', fX0 + fW / 2, fY0 + 34);
    }

    drawClearPanel();
    drawGachaAnimation();
    drawConfetti();
    ctx.restore();
}

const LERP = 0.2;
const HOLD = 16;

function loop() {
    let moving = false;
    tick++;
    pulse *= 0.88;
    shake *= 0.86;
    if(shake < 0.3) shake = 0;
    updateConfetti();
    if(gachaAnim > 0) gachaAnim--;
    for(let i = effects.length - 1; i >= 0; i--) {
        effects[i].life--;
        if(effects[i].life <= 0) effects.splice(i, 1);
    }

    for(const p of players) {
        p.x += (p.tx - p.x) * LERP;
        p.y += (p.ty - p.y) * LERP;
        if(Math.hypot(p.tx - p.x, p.ty - p.y) > 0.5) {
            moving = true;
        }
        else {
            p.x = p.tx;
            p.y = p.ty;
        }
    }

    if(ballFlight) {
        ball.x += (ball.tx - ball.x) * 0.26;
        ball.y += (ball.ty - ball.y) * 0.26;
        if(Math.hypot(ball.tx - ball.x, ball.ty - ball.y) > 0.5) {
            moving = true;
        }
        else {
            ball.x = ball.tx;
            ball.y = ball.ty;
        }
    }
    else if(ball.holder) {
        ball.x = ball.holder.x;
        ball.y = ball.holder.y;
    }

    draw();

    if(busy && !moving) {
        holdCnt++;
        if(holdCnt >= HOLD) {
            busy = false;
            caption = '';
            const cb = pendingResolve;
            pendingResolve = null;
            if(cb) cb();
        }
    }
    requestAnimationFrame(loop);
}

let dragging = null;
let downX = 0;
let downY = 0;
let activePointerId = null;

function getEventPos(e) {
    const rect = cv.getBoundingClientRect();
    const clientX = typeof e.clientX === 'number' ? e.clientX : 0;
    const clientY = typeof e.clientY === 'number' ? e.clientY : 0;
    return { x:clientX - rect.left, y:clientY - rect.top };
}

function pickPlayer(x, y) {
    for(const p of players) {
        if(dist({x, y}, p) < R * 1.5) return p;
    }
    return null;
}

function pointerDown(e) {
    if(e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT') return;
    e.preventDefault();
    sfx.unlock();
    if(activePointerId !== null) return;
    activePointerId = e.pointerId;
    if(cv.setPointerCapture) {
        try { cv.setPointerCapture(e.pointerId); } catch(err) {}
    }
    const q = getEventPos(e);
    downX = q.x;
    downY = q.y;
    if(mode === 'edit') {
        dragging = pickPlayer(q.x, q.y) || (ball.holder ? null : ball);
    }
}

function pointerMove(e) {
    if(activePointerId !== null && e.pointerId !== activePointerId) return;
    if(mode !== 'edit' || !dragging) return;
    e.preventDefault();
    const q = getEventPos(e);
    dragging.x = dragging.tx = clamp(q.x, fX0 + R, fX1 - R);
    dragging.y = dragging.ty = clamp(q.y, fY0 + R, fY0 + fH - R);
    if(dragging === ball.holder) {
        ball.x = dragging.x;
        ball.y = dragging.y;
    }
    draw();
}

function pointerUp(e) {
    if(activePointerId !== null && e.pointerId !== activePointerId) return;
    e.preventDefault();
    if(cv.releasePointerCapture) {
        try { cv.releasePointerCapture(e.pointerId); } catch(err) {}
    }
    activePointerId = null;

    if(mode === 'edit') {
        dragging = null;
        return;
    }
    if(busy) return;

    const q = getEventPos(e);
    if(!isFinite(q.x) || !isFinite(q.y)) return;
    if(Math.hypot(q.x - downX, q.y - downY) > R * 1.2) return;

    if(phase === 'lost') {
        setFeedback('', '「1手戻す」か「リセット」で続けよう。');
        return;
    }

    const hit = pickPlayer(q.x, q.y);
    if(hit && hit.team === 'blue' && hit !== ball.holder) {
        startAim(hit);
        return;
    }
    if(hit && hit === ball.holder) return;

    if(phase === 'you') {
        doDribble(
            clamp(q.x, fX0 + R, fX1 - R),
            clamp(q.y, fY0 + R, fY0 + fH - R)
        );
    }
}

cv.addEventListener('pointerup', pointerUp, {passive:false});
cv.addEventListener('pointercancel', pointerUp, {passive:false});

function resizeGame() {
    computeField();
    for(const p of players) {
        p.x = clamp(p.x, fX0 + R, fX1 - R);
        p.y = clamp(p.y, fY0 + R, fY0 + fH - R);

        p.ty = clamp(p.ty, fY0 + R, fY0 + fH - R);

function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));
}

function renderZukan() {

    const rate = Math.round(owned / CARDS.length * 100);

        'おなじカードが出ると Lv アップ（最大 Lv' + MAX_CARD_LEVEL + '）。選手カードは Lv で少しずつ強くなるよ。';

    const sorted = [...CARDS].sort((a, b) => b.rarity - a.rarity);

        const rar = RARITIES[c.rarity];

                + '<span class="ic">' + c.icon + '</span>'
                + '<span class="nm">？？？</span>'
                + '<span class="rt">' + rar.stars + '</span>'
                + '<span class="ds">ゴールを決めてゲット!</span>'
                + '</div>';
        }
        const lv = cardLevel(c.id);
        const desc = c.kind === 'player' ? c.trait.desc : c.desc;
        return '<div class="card r' + c.rarity + '">'
            + (lv > 1 ? '<span class="lv">Lv' + lv + '</span>' : '')
            + '<span class="ic">' + c.icon + '</span>'
            + '<span class="nm">' + escapeHtml(c.title) + '</span>'
            + '<span class="rt">' + rar.stars + ' ' + rar.short + '</span>'
            + '<span class="ds">' + escapeHtml(desc) + (count > 1 ? '（×' + count + '）' : '') + '</span>'
            + '</div>';
    }).join('');
}

function refreshZukan() {
    if(zukanEl.classList.contains('open')) renderZukan();
}

document.getElementById('zukanBtn').addEventListener('click', () => {
    sfx.tap();
    renderZukan();
    zukanEl.classList.add('open');
});
document.getElementById('zukanClose').addEventListener('click', () => {
    sfx.tap();
    zukanEl.classList.remove('open');
});
zukanEl.addEventListener('click', (e) => {
    if(e.target === zukanEl) zukanEl.classList.remove('open');
});

reset();
loop();
</script>
</body>
</html>
